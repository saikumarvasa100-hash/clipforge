version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: clipforge_local
      POSTGRES_DB: clipforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  fastapi-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://clipforge:clipforge_local@postgres:5432/clipforge
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_PATH: /home/clipforge/storage
    volumes:
      - video_storage:/home/clipforge/storage
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://clipforge:clipforge_local@postgres:5432/clipforge
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_PATH: /home/clipforge/storage
    volumes:
      - video_storage:/home/clipforge/storage
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://clipforge:clipforge_local@postgres:5432/clipforge
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_PATH: /home/clipforge/storage
    volumes:
      - video_storage:/home/clipforge/storage
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
      - video_storage:/home/clipforge/storage:ro
    depends_on:
      - fastapi-backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  video_storage:
  nginx_certs:
